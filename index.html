<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GBF Tools</title>

<link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" type="image/png" href="favicon.png">

<link rel="canonical" href="https://ys-un.github.io/gbf-tools/">

<script>
if(location.pathname.endsWith("/index.html")){
    location.replace("./");
}
</script>
</head>

<body>

<div class="mobile_header">

  <button
    class="menu_btn"
    onclick="toggleMenu()"
  >
    ☰ MENU
  </button>

</div>

<div class="sidebar" id="sidebar">

  <h2>GBF Tools</h2>

  <a href="index.html">TOP</a>
  <a href="stone.html">天井計算機</a>
  <a href="meat.html">肉消費計算機</a>
  <a href="speed.html">時速換算</a>
  <a href="efficiency.html">HELL効率比較</a>
  <a href="event/">イベント戦貨計算機</a>

</div>

<div class="main">

  <div class="card">

    <h1>GBF 便利ツール</h1>

    <div class="tool_list">

      <a class="tool_link" href="stone.html">
        宝晶石 天井計算機
      </a>

      <a class="tool_link" href="meat.html">
        古戦場 肉消費計算機
      </a>

      <a class="tool_link" href="speed.html">
        古戦場 時速換算
      </a>

      <a class="tool_link" href="efficiency.html">
        古戦場 HELL効率比較
      </a>

      <a class="tool_link" href="event/">
        イベント戦貨計算機 <span class="tool_badge">NEW</span>
      </a>

    </div>

  </div>

</div>

<script src="assets/js/cmn.js"></script>
<script type="module" src="assets/js/firebase.js"></script>

<div class="auth_floating" id="authFloating">
  <div class="auth_panel" id="authPanel" hidden>
    <button type="button" class="auth_login_btn" id="googleLoginBtn">
      Googleでログイン
    </button>

    <div class="auth_user" id="authUser" hidden>
      <img class="auth_user_photo" id="authUserPhoto" alt="" hidden>
      <span class="auth_user_name" id="authUserName"></span>
    </div>

    <button type="button" class="auth_logout_btn" id="logoutBtn" hidden>
      ログアウト
    </button>

    <p class="auth_message" id="authMessage">
      未ログイン：この端末に保存されます
    </p>
  </div>

  <button
    type="button"
    class="auth_floating_toggle"
    id="authToggle"
    aria-controls="authPanel"
    aria-expanded="false"
    aria-label="ログイン・同期状況を表示"
  >
    <span class="auth_status_dot" id="authStatusDot" aria-hidden="true"></span>
    <img class="auth_mini_photo" id="authMiniPhoto" alt="" hidden>
    <span class="auth_compact_text" id="authCompactText">Googleでログイン</span>
    <span class="auth_toggle_chevron" aria-hidden="true">⌃</span>
  </button>
</div>

</body>
</html>
