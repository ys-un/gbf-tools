<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グラブル スケジュール｜GBF Tools</title>
<link rel="stylesheet" href="../assets/css/style.css?v=20260717-schedule3">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="canonical" href="https://ys-un.github.io/gbf-tools/schedule/">
</head>
<body class="schedule_page">
<div class="mobile_header"><button class="menu_btn" onclick="toggleMenu()">☰ MENU</button></div>
<div class="sidebar" id="sidebar">
  <h2>GBF Tools</h2>

  <a href="../">ダッシュボード</a>
  <a href="./">スケジュール</a>
  <a href="../stone/">天井計算機</a>
  <a href="../event/">イベント戦貨計算機</a>
  <a href="../meat/">肉消費計算機</a>
  <a href="../speed/">時速換算</a>
  <a href="../efficiency/">HELL効率比較</a>

</div>
<main class="main">
  <section class="card schedule_hero">
    <div>
      <p class="schedule_eyebrow">SCHEDULE</p>
      <h1>イベントスケジュール</h1>
      <p class="schedule_lead">開催中・今後のイベントやアップデートを、月間タイムラインで確認できます。</p>
    </div>
    <p class="schedule_updated" id="scheduleUpdated">更新情報を読み込み中...</p>
  </section>

  <section class="schedule_status_grid" aria-label="直近の予定">
    <article class="card schedule_status _now">
      <span class="schedule_status_label">開催中</span>
      <div id="currentEvents"><p class="schedule_empty">読み込み中...</p></div>
    </article>
    <article class="card schedule_status _next">
      <span class="schedule_status_label">次の予定</span>
      <div id="nextEvent"><p class="schedule_empty">読み込み中...</p></div>
    </article>
  </section>

  <section class="card schedule_calendar_card">
    <div class="schedule_month_head">
      <button type="button" class="schedule_month_btn" id="prevMonth" aria-label="前月">‹</button>
      <div><p id="scheduleYear">2026</p><h2 id="scheduleMonth">7月</h2></div>
      <button type="button" class="schedule_month_btn" id="nextMonth" aria-label="翌月">›</button>
    </div>

    <div class="schedule_filter_area">
      <div>
        <p class="schedule_filter_title">表示するカテゴリー</p>
        <p class="schedule_filter_help">不要なカテゴリーを外すと、カレンダーと予定一覧が見やすくなります。</p>
      </div>
      <div class="schedule_filters" id="scheduleFilters" aria-label="表示カテゴリー"></div>
    </div>

    <div class="schedule_timeline_wrap">
      <div class="schedule_timeline" id="scheduleTimeline"></div>
    </div>
    <p class="schedule_scroll_note">横にスクロールできます</p>
  </section>

  <section class="card schedule_list_card">
    <h2>予定一覧</h2>
    <div class="schedule_list" id="scheduleList"></div>
  </section>

  <section class="card schedule_notice">
    <h2>スケジュールについて</h2>
    <p>※開催予定は公式発表をもとに掲載しています。</p>
  </section>
</main>
<script src="../assets/js/cmn.js"></script>
<script src="../assets/js/schedule.js?v=20260717-1"></script>
<script type="module" src="../assets/js/firebase.js"></script>
<div class="auth_floating is_auth_loading" id="authFloating">
  <div class="auth_panel" id="authPanel" hidden>
    <button type="button" class="auth_login_btn" id="googleLoginBtn">Googleでログイン</button>
    <div class="auth_user" id="authUser" hidden><img class="auth_user_photo" id="authUserPhoto" alt="" hidden><span class="auth_user_name" id="authUserName"></span></div>
    <button type="button" class="auth_logout_btn" id="logoutBtn" hidden>ログアウト</button>
    <p class="auth_message" id="authMessage">未ログイン：この端末に保存されます</p>
  </div>
  <button type="button" class="auth_floating_toggle" id="authToggle" aria-controls="authPanel" aria-expanded="false" aria-label="ログイン・同期状況を表示">
    <span class="auth_google_mark" id="authGoogleMark" aria-hidden="true">G</span>
    <span class="auth_avatar_wrap" id="authAvatarWrap" hidden><img class="auth_mini_photo" id="authMiniPhoto" alt="" hidden><span class="auth_status_dot" id="authStatusDot" aria-hidden="true"></span></span>
    <span class="auth_compact_name" id="authCompactName" hidden></span><span class="auth_login_text" id="authLoginText">Googleでログイン</span>
  </button>
</div>
</body>
</html>
