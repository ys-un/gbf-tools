<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>古戦場 肉消費計算機</title>

<link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" type="image/png" href="favicon.png">

<link rel="canonical" href="https://ys-un.github.io/gbf-tools/meat.html">

</head>

<body class="meat_page">

<div class="mobile_header">

  <button
    class="menu_btn"
    onclick="toggleMenu()"
  >
    ☰ MENU
  </button>

</div>

<div class="sidebar" id="sidebar">

  <h2>GBF Tools</h2>

  <a href="index.html">TOP</a>
  <a href="stone.html">天井計算機</a>
  <a href="meat.html">肉消費計算機</a>
  <a href="speed.html">時速換算</a>
  <a href="efficiency.html">HELL効率比較</a>

  <div class="auth_box">
    <button type="button" class="auth_login_btn" id="googleLoginBtn">
      Googleでログイン
    </button>

    <div class="auth_user" id="authUser" hidden>
      <img class="auth_user_photo" id="authUserPhoto" alt="" hidden>
      <span class="auth_user_name" id="authUserName"></span>
    </div>

    <button type="button" class="auth_logout_btn" id="logoutBtn" hidden>
      ログアウト
    </button>

    <p class="auth_message" id="authMessage">
      未ログイン：この端末に保存されます
    </p>
  </div>

</div>

<div class="main">

  <div class="card">

    <h1>古戦場 肉消費計算機</h1>

    <div class="grid">

      <div class="field">
        <label>グラッジ</label>
        <input type="number" id="chunk" value="10000">
      </div>

      <div class="field">
        <label>マリシャス</label>
        <input type="number" id="clump" value="0">
      </div>

      <div class="field">
        <label>95HELL 討伐時間（秒）</label>
        <input type="number" id="time95" value="10">
      </div>

      <div class="field">
        <label>150HELL 討伐時間（秒）</label>
        <input type="number" id="time150" value="20">
      </div>

      <div class="field">
        <label>200HELL 討伐時間（秒）</label>
        <input type="number" id="time200" value="120">
      </div>

      <div class="field">
        <label>250HELL 討伐時間（秒）</label>
        <input type="number" id="time250" value="450">
      </div>

    </div>

    <div class="result">

      <div class="result_item">
        <div class="result_label">95HELL 周回数</div>
        <div class="result_value" id="count95">0回</div>
      </div>

      <div class="result_item">
        <div class="result_label">95HELL 消化時間</div>
        <div class="result_value" id="hour95">0時間</div>
      </div>

      <div class="result_item">
        <div class="result_label">150HELL 周回数</div>
        <div class="result_value" id="count150">0回</div>
      </div>

      <div class="result_item">
        <div class="result_label">150HELL 消化時間</div>
        <div class="result_value" id="hour150">0時間</div>
      </div>

      <div class="result_item">
        <div class="result_label">200HELL 周回数</div>
        <div class="result_value" id="count200">0回</div>
      </div>

      <div class="result_item">
        <div class="result_label">200HELL 消化時間</div>
        <div class="result_value" id="hour200">0時間</div>
      </div>

      <div class="result_item">
        <div class="result_label">250HELL 周回数</div>
        <div class="result_value" id="count250">0回</div>
      </div>

      <div class="result_item">
        <div class="result_label">250HELL 消化時間</div>
        <div class="result_value" id="hour250">0時間</div>
      </div>

    </div>

    <div class="button_area">

      <button
        type="button"
        class="action_btn reset_btn"
        onclick="resetData()"
      >
        リセット
      </button>

    </div>

    <div class="note">
      ※ 消費数<br>
      95HELL = グラッジ10個<br>
      150HELL = グラッジ20個<br>
      200HELL = グラッジ20個<br>
      250HELL = マリシャス20個
    </div>

  </div>

</div>

<script src="assets/js/cmn.js"></script>
<script type="module" src="assets/js/firebase.js"></script>
<script src="assets/js/meat.js"></script>

</body>
</html>
